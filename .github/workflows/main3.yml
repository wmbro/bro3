name: Docker Python Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */1 * * *"
  push:
    branches: ["main"]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug secrets
        run: |
          echo "URL=${{ secrets.URL }}"
          echo "URL_BROWSER=${{ secrets.URL_BROWSER }}"

      - name: Build Docker
        run: docker build -t bot .

      - name: Run Docker
        shell: bash
        run: |
          docker run --rm \
            -e URL="${{ secrets.URL }}" \
            -e URL_BROWSER="${{ secrets.URL_BROWSER }}" \
            -e MINUTOS="${{ secrets.MINUTOS }}" \
            -e MAX_RETRIES="${{ secrets.MAX_RETRIES }}" \
            -v "${{ github.workspace }}:/app" \
            bot

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screen.png
